  /api/v1/menu-items/:
    get:
      operationId: v1_menu_items_list
      description: Menu Item
      summary: Menu Items
      parameters:
      - in: query
        name: category
        schema:
          type: string
          enum:
          - appetizer
          - beverage
          - dessert
          - main_course
          - side_dish
        description: |-
          * `appetizer` - Appetizer
          * `main_course` - Main Course
          * `dessert` - Dessert
          * `beverage` - Beverage
          * `side_dish` - Side Dish
      - in: query
        name: dietary_info
        schema:
          type: string
          enum:
          - dairy_free
          - gluten_free
          - none
          - vegan
          - vegetarian
        description: |-
          * `vegetarian` - Vegetarian
          * `vegan` - Vegan
          * `gluten_free` - Gluten-Free
          * `dairy_free` - Dairy-Free
          * `none` - None
      - in: query
        name: is_available
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: price__lte
        schema:
          type: number
      - in: query
        name: restaurant
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Menu Items
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMenuItemList'
          description: ''
    post:
      operationId: v1_menu_items_create
      description: Menu Items creation
      summary: Menu Items
      tags:
      - Menu Items
      requestBody:
        content:
          application/json:
            schema:
