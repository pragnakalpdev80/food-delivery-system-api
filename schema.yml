          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAddressRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
    delete:
      operationId: v1_addresses_destroy
      description: We have added soft delete to delete customer address
      summary: Soft deletion of customer address
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this address.
        required: true
      tags:
      - Customer Address
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
